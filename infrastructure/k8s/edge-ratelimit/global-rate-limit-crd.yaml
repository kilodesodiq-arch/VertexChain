apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: globalratelimits.networking.vertexchain.io
spec:
  group: networking.vertexchain.io
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - rules
              properties:
                selector:
                  type: object
                  properties:
                    gateway:
                      type: string
                rules:
                  type: array
                  items:
                    type: object
                    required:
                      - path
                      - method
                    properties:
                      path:
                        type: string
                      method:
                        type: string
                      localLimit:
                        type: object
                        required:
                          - burst
                          - rate
                          - unit
                        properties:
                          burst:
                            type: integer
                          rate:
                            type: integer
                          unit:
                            type: string
                            enum: [second, minute, hour]
                      globalLimit:
                        type: object
                        required:
                          - key
                          - requestsPerUnit
                          - unit
                        properties:
                          key:
                            type: string
                          requestsPerUnit:
                            type: integer
                          unit:
                            type: string
                            enum: [second, minute, hour, day]
  names:
    kind: GlobalRateLimit
    plural: globalratelimits
    singular: globalratelimit
    shortNames:
      - grl
  scope: Namespaced
